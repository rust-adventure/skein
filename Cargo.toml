serde = "1.0"
serde_json = "1.0"
tracing = "0.1"
gltf = "1.4.0"

# wasm can't support brp, so disable the dependency entirely
[target.'cfg(not(target_family = "wasm"))'.dependencies]
# bevy_remote = { git = "https://github.com/ChristopherBiscardi/bevy.git", branch = "yeet-extension-ids", optional = true }
# bevy_remote = { path = "/Users/chris/github/bevyengine/bevy-gltf-extensions/crates/bevy_remote", optional = true }
bevy_remote = { git = "https://github.com/bevyengine/bevy.git", optional = true }


[dev-dependencies]
# bevy = { path = "/Users/chris/github/bevyengine/bevy-gltf-extensions" }
# bevy = { version = "0.17", features = ["jpeg", "experimental_pbr_pcss"] }
# bevy = { git = "https://github.com/ChristopherBiscardi/bevy.git", branch = "yeet-extension-ids" }
bevy = { git = "https://github.com/bevyengine/bevy.git" }

serde = { version = "1.0", features = ["derive"] }
test-components = { path = "./test-components" }

[features]
default = ["brp", "presets"]
# Serve the Bevy schema via BRP
brp = ["dep:bevy_remote"]
presets = ["brp"]

# Idiomatic Bevy code often triggers these lints, and the CI workflow treats them as errors.
# In some cases they may still signal poor code quality however, so consider commenting out these lines.
[lints.clippy]
# Bevy supplies arguments to systems via dependency injection, so it's natural for systems to
# request more than 7 arguments -- which triggers this lint.
too_many_arguments = "allow"
# Queries that access many components may trigger this lint.
type_complexity = "allow"
# links in documentation
doc_markdown = "deny"

[lints.rust]
missing_docs = "deny"

[package.metadata.bevy_lint]
missing_reflect = "deny"
